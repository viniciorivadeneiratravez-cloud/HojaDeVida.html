<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="post">
        <label for="">Nombre: </label>
        <input type="text" name="" id="">
        <br><br>
        <label for="">Edad:</label>
        <input type="number" name="" id="" placeholder="Ingrse solo numeros"> 
        <br><br>
        <label for="">Contraseña:</label>
        <input type="password" name="" id="">
        <br><br>
        <label for="">Fecha:</label>
        <input type="date" name="" id="">
        <br><br>
        <label for="">Email:</label>
        <input type="email" name="" id="" required>
        <br><br>
        <label for="">Telefono:</label>
        <input type="tel" name="" id="">
        <br><br>
        <label for="">Texarea:</label>
        <textarea name="" id="" cols="50" rows="3"></textarea>
        <br><br>
        <label for="">Seleccione:</label>
        <select name="" id="">
            <option value="">Azul</option>
            <option value="">Rojo</option>
            <option value="">Verde</option>
        </select>
        <br><br>
        <label for="">Radio:</label> <br>
        <input type="radio" name="rbtn_prueba" id=""> HTML <br> 
        <input type="radio" name="rbtn_prueba" id=""> CSS <br> 
        <input type="radio" name="rbtn_prueba" id=""> JAVASCRIPT <br> 
        <br><br>
        <label for="">Check</label><br>
        <input type="checkbox" name="checkbox_uno" id=""> HTML <br> 
        <input type="checkbox" name="checkbox_uno" id=""> CSS <br> 
        <input type="checkbox" name="checkbox_uno" id=""> JAVASCRIPT <br> 
        <br><br>
        <label for="">Subir Archivo</label>
        <input type="file" name="" id="">
        <br><br>
        <label for="">Color</label>
        <input type="color" name="" id="">
        <br><br>
        <label for=""> placeholder:</label>
        <input type="number" name="" id="" placeholder="Ingreso solo numeros">
        <br><br>
        <label for="">Maxlenght</label>
        <input type="text" name="" id="" maxlength="5">
        <br><br>
        <label for="">Max y Min</label>
        <input type="number" name="" id="" max="10" min="0">
        <br><br>
        <label for="">Resetear</label>
        <input type="reset">
        <br><br>
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
